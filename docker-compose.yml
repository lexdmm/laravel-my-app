services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - task_network

  nginx:
    image: nginx:alpine
    container_name: task_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - task_network

  db:
    image: postgres:16-alpine
    container_name: task_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-taskdb}
      POSTGRES_USER: ${DB_USERNAME:-taskuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskpass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - task_network

volumes:
  pgdata:

networks:
  task_network:
    driver: bridge
